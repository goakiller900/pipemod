name: Build and release Factorio mod

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      publish_factorio_portal:
        description: Publish this version to the Factorio Mod Portal
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: factorio-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Factorio archive
    runs-on: ubuntu-latest
    env:
      FACTORIO_API_KEY: ${{ secrets.FACTORIO_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read mod and branch metadata
        id: metadata
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          from pathlib import Path

          info = json.loads(Path("info.json").read_text(encoding="utf-8"))
          name = info["name"]
          version = info["version"]
          title = info["title"]
          branch = os.environ.get("GITHUB_HEAD_REF") or os.environ["GITHUB_REF_NAME"]
          safe_branch = re.sub(r"[^A-Za-z0-9._-]+", "-", branch).strip("-").lower()
          archive = f"{name}_{version}.zip"

          print(f"name={name}")
          print(f"version={version}")
          print(f"title={title}")
          print(f"tag=v{version}")
          print(f"archive={archive}")
          print(f"checksum={archive}.sha256")
          print(f"branch={branch}")
          print(f"safe_branch={safe_branch}")
          print(f"branch_tag=branch-{safe_branch}")
          print(f"short_sha={os.environ['GITHUB_SHA'][:7]}")
          PY

      - name: Validate and build release archive
        run: python scripts/build_release.py

      - name: Create or replace branch prerelease
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref != 'refs/heads/master' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MOD_TITLE: ${{ steps.metadata.outputs.title }}
          VERSION: ${{ steps.metadata.outputs.version }}
          BRANCH: ${{ steps.metadata.outputs.branch }}
          BRANCH_TAG: ${{ steps.metadata.outputs.branch_tag }}
          SHORT_SHA: ${{ steps.metadata.outputs.short_sha }}
          ARCHIVE: dist/${{ steps.metadata.outputs.archive }}
          CHECKSUM: dist/${{ steps.metadata.outputs.checksum }}
        run: |
          set -euo pipefail

          if gh release view "$BRANCH_TAG" >/dev/null 2>&1; then
            gh release delete "$BRANCH_TAG" --cleanup-tag --yes
          elif git ls-remote --exit-code --tags origin "refs/tags/$BRANCH_TAG" >/dev/null 2>&1; then
            git push origin ":refs/tags/$BRANCH_TAG"
          fi

          gh release create "$BRANCH_TAG" "$ARCHIVE" "$CHECKSUM" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "$MOD_TITLE $VERSION — $BRANCH ($SHORT_SHA)" \
            --notes "Automated test build from branch \`$BRANCH\` at commit \`$GITHUB_SHA\`. This is not a stable or Mod Portal release. Review LICENSE.txt before redistributing modified builds."

      - name: Create or verify immutable stable release
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MOD_TITLE: ${{ steps.metadata.outputs.title }}
          VERSION: ${{ steps.metadata.outputs.version }}
          TAG: ${{ steps.metadata.outputs.tag }}
          ARCHIVE: dist/${{ steps.metadata.outputs.archive }}
          CHECKSUM: dist/${{ steps.metadata.outputs.checksum }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          if gh release view "$TAG" >/dev/null 2>&1; then
            rm -rf /tmp/existing-release
            mkdir -p /tmp/existing-release
            gh release download "$TAG" --pattern "$(basename "$ARCHIVE")" --dir /tmp/existing-release
            existing_archive="/tmp/existing-release/$(basename "$ARCHIVE")"
            built_digest="$(sha256sum "$ARCHIVE" | awk '{print $1}')"
            existing_digest="$(sha256sum "$existing_archive" | awk '{print $1}')"

            if [[ "$built_digest" != "$existing_digest" ]]; then
              echo "::error title=Immutable version conflict::$TAG already contains different bytes. Increase info.json version; never overwrite a published version."
              exit 1
            fi

            echo "Existing $TAG release contains the identical archive."
          elif git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            tag_sha="$(git rev-list -n 1 "$TAG")"
            if [[ "$tag_sha" != "$GITHUB_SHA" ]]; then
              echo "::error title=Version tag conflict::$TAG points to $tag_sha, not $GITHUB_SHA. Increase the version or repair the tag manually."
              exit 1
            fi
            gh release create "$TAG" "$ARCHIVE" "$CHECKSUM" \
              --verify-tag \
              --title "$MOD_TITLE $VERSION" \
              --generate-notes
          else
            gh release create "$TAG" "$ARCHIVE" "$CHECKSUM" \
              --target "$GITHUB_SHA" \
              --title "$MOD_TITLE $VERSION" \
              --generate-notes
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.name }}_${{ steps.metadata.outputs.version }}_${{ steps.metadata.outputs.safe_branch }}_${{ steps.metadata.outputs.short_sha }}
          path: |
            dist/${{ steps.metadata.outputs.archive }}
            dist/${{ steps.metadata.outputs.checksum }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Require API key for requested portal publication
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && inputs.publish_factorio_portal && env.FACTORIO_API_KEY == '' }}
        shell: bash
        run: |
          echo "::error title=Missing FACTORIO_API_KEY::Add a Mod Portal API key as the repository secret FACTORIO_API_KEY."
          exit 1

      - name: Publish to Factorio Mod Portal
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && inputs.publish_factorio_portal && env.FACTORIO_API_KEY != '' }}
        shell: bash
        env:
          MOD_NAME: ${{ steps.metadata.outputs.name }}
          VERSION: ${{ steps.metadata.outputs.version }}
          ARCHIVE: dist/${{ steps.metadata.outputs.archive }}
        run: |
          set -euo pipefail

          metadata_file="$(mktemp)"
          status="$(curl --silent --show-error --output "$metadata_file" --write-out '%{http_code}' "https://mods.factorio.com/api/mods/$MOD_NAME")"

          if [[ "$status" == "200" ]]; then
            if PORTAL_METADATA_FILE="$metadata_file" VERSION="$VERSION" python - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path(os.environ["PORTAL_METADATA_FILE"]).read_text(encoding="utf-8"))
          version = os.environ["VERSION"]
          raise SystemExit(0 if any(item.get("version") == version for item in metadata.get("releases", [])) else 1)
          PY
            then
              echo "::error title=Version already published::$MOD_NAME $VERSION already exists on the Mod Portal. Increase the version; do not replace it."
              exit 1
            fi
          elif [[ "$status" != "404" ]]; then
            echo "::error title=Portal lookup failed::HTTP $status while checking $MOD_NAME."
            cat "$metadata_file"
            exit 1
          fi

          init_response="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $FACTORIO_API_KEY" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "mod=$MOD_NAME" \
            "https://mods.factorio.com/api/v2/mods/releases/init_upload")"

          upload_url="$(INIT_RESPONSE="$init_response" python - <<'PY'
          import json
          import os
          import sys

          response = json.loads(os.environ["INIT_RESPONSE"])
          if response.get("error"):
              print(f"Factorio Mod Portal error: {response.get('error')}: {response.get('message', '')}", file=sys.stderr)
              raise SystemExit(1)
          if not response.get("upload_url"):
              print("Factorio Mod Portal did not return an upload URL.", file=sys.stderr)
              raise SystemExit(1)
          print(response["upload_url"])
          PY
          )"

          upload_response="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $FACTORIO_API_KEY" \
            --form "file=@$ARCHIVE;type=application/zip" \
            "$upload_url")"

          UPLOAD_RESPONSE="$upload_response" python - <<'PY'
          import json
          import os
          import sys

          response = json.loads(os.environ["UPLOAD_RESPONSE"])
          if response.get("error"):
              print(f"Factorio Mod Portal error: {response.get('error')}: {response.get('message', '')}", file=sys.stderr)
              raise SystemExit(1)
          PY

          echo "Published $MOD_NAME version $VERSION to the Factorio Mod Portal."
