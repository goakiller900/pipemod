name: Build Advanced Fluid Handling Continued

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: afhc-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Factorio 2.1 mod archive
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read mod metadata
        id: metadata
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          info = json.loads(Path("info.json").read_text(encoding="utf-8"))
          name = info["name"]
          version = info["version"]
          archive = f"{name}_{version}.zip"

          print(f"name={name}")
          print(f"version={version}")
          print(f"archive={archive}")
          print(f"checksum={archive}.sha256")
          PY

      - name: Validate and build AFHC
        run: python scripts/build_release.py

      - name: Verify Factorio archive
        shell: bash
        env:
          ARCHIVE: dist/${{ steps.metadata.outputs.archive }}
          MOD_NAME: ${{ steps.metadata.outputs.name }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -euo pipefail

          test -f "$ARCHIVE"
          unzip -t "$ARCHIVE"
          unzip -l "$ARCHIVE"

          python - <<'PY'
          import os
          import zipfile
          from pathlib import PurePosixPath

          archive_path = os.environ["ARCHIVE"]
          mod_name = os.environ["MOD_NAME"]
          version = os.environ["VERSION"]
          expected_root = f"{mod_name}_{version}"
          legacy_namespace = "__underground-pipe-pack__/"

          with zipfile.ZipFile(archive_path) as archive:
              names = archive.namelist()
              roots = {PurePosixPath(name).parts[0] for name in names if name}
              if roots != {expected_root}:
                  raise SystemExit(f"Unexpected archive root(s): {sorted(roots)}")

              info_path = f"{expected_root}/info.json"
              if info_path not in names:
                  raise SystemExit(f"Missing {info_path}")

              stale = []
              for name in names:
                  if PurePosixPath(name).suffix.lower() not in {".lua", ".cfg", ".json", ".md", ".txt", ".yml", ".yaml"}:
                      continue
                  text = archive.read(name).decode("utf-8", errors="replace")
                  if legacy_namespace in text:
                      stale.append(name)

              if stale:
                  raise SystemExit("Legacy mod namespace remains in: " + ", ".join(stale))
          PY

      - name: Upload Factorio-ready build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.name }}_${{ steps.metadata.outputs.version }}_${{ github.sha }}
          path: |
            dist/${{ steps.metadata.outputs.archive }}
            dist/${{ steps.metadata.outputs.checksum }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
